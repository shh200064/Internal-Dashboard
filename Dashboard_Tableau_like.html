<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trendline Worksheet — UC San Diego Library</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Source Sans 3', Arial, sans-serif; background:#fff; color:#222; font-size:13px; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* top bar */
  .topbar { padding:10px 18px 6px; border-bottom:1px solid #ddd; display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .topbar-title { font-size:14px; font-weight:600; color:#333; }
  .topbar-sub { font-size:11px; color:#888; }

  /* main area */
  .workspace { display:flex; flex:1; overflow:hidden; }

  /* chart area */
  .chart-area { flex:1; display:flex; flex-direction:column; padding:16px 12px 12px 8px; min-width:0; }
  .chart-title { font-size:13px; font-weight:400; color:#555; margin-bottom:4px; padding-left:48px; }
  .chart-wrap { flex:1; position:relative; min-height:0; }

  /* sidebar */
  .sidebar { width:240px; flex-shrink:0; border-left:1px solid #ddd; background:#fafafa; display:flex; flex-direction:column; overflow:hidden; }
  .sidebar-header { padding:10px 14px 8px; font-size:12px; font-weight:600; color:#444; border-bottom:1px solid #e5e5e5; display:flex; align-items:center; justify-content:space-between; }
  .sidebar-header span { font-size:11px; color:#888; font-weight:400; }
  .sidebar-scroll { flex:1; overflow-y:auto; padding:6px 0; }

  .cat-item { display:flex; align-items:center; gap:8px; padding:4px 14px; cursor:pointer; border-radius:0; transition:background .1s; user-select:none; }
  .cat-item:hover { background:#f0f0f0; }
  .cat-item input[type=checkbox] { width:13px; height:13px; cursor:pointer; accent-color:#888; flex-shrink:0; }
  .cat-item label { font-size:12px; color:#333; cursor:pointer; line-height:1.3; }
  .cat-item.active label { color:#222; font-weight:500; }

  /* color swatch next to active items */
  .swatch { width:12px; height:12px; border-radius:1px; flex-shrink:0; display:none; }
  .cat-item.active .swatch { display:block; }

  /* axis labels */
  .x-label { text-align:center; font-size:11px; color:#888; margin-top:2px; }
  .y-label-wrap { position:absolute; left:0; top:50%; transform:translateY(-50%) rotate(-90deg); font-size:11px; color:#888; white-space:nowrap; transform-origin:center center; width:40px; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Trendline worksheet</div>
    <div class="topbar-sub">UC San Diego Library · ARL Data 2012–2023</div>
  </div>
</div>

<div class="workspace">
  <div class="chart-area">
    <div class="chart-title" id="chartTitle">Number of successful full-text article requests (journals), Volumes held</div>
    <div class="chart-wrap">
      <canvas id="mainChart"></canvas>
    </div>
    <div class="x-label">Year</div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">Categories <span>↑↓</span></div>
    <div class="sidebar-scroll" id="catList"></div>
  </div>
</div>

<script>
const YEARS = [2012,2013,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023];

// All available categories with their data
const CATEGORIES = [
  { name: "Annual gate count", data: [null,null,null,null,null,null,null,null,null,null,null,null] },
  { name: "Doctor's degrees awarded", data: [null,null,null,null,null,null,null,null,null,null,null,null] },
  { name: "Electronic books", data: [588230,763919,1784849,2313499,1196986,1262361,1458478,1556783,1909050,1966552,1707691,2343031] },
  { name: "Group presentations", data: [1269,643,308,520,538,665,732,833,717,436,322,243] },
  { name: "Initial circulation", data: [596800,221611,196155,180338,129852,153652,159099,148136,93652,10967,48169,51048] },
  { name: "Number of regular searches (databases)", data: [2632292,3280398,3586011,null,null,1345865,12490643,2208438,18661910,null,9920052,5530888] },
  { name: "Number of successful full-text article requests (journals)", data: [493893,null,null,5974475,null,7440990,6905598,6428592,344138,9024,3307158,9930267], defaultOn: true },
  { name: "Presentation participants", data: [18606,10740,9654,18492,25665,31544,27691,27212,16411,31284,17877,25836] },
  { name: "Reference queries", data: [108142,94134,51692,59422,27993,20598,16849,19972,14523,444,9394,18380] },
  { name: "Titles held", data: [5632885,3018476,4713846,null,2923233,3169830,3405975,3536260,3306054,3427936,4039847,5171773] },
  { name: "Total interlibrary borrowing", data: [20162,17764,15985,4144,15802,16748,14806,14225,16319,11094,14308,16125] },
  { name: "Total interlibrary lending", data: [22726,19635,18270,17152,16590,21717,21558,19136,16504,5186,9859,10426] },
  { name: "Volumes held", data: [3466702,4009952,5583014,5365746,4395656,4484768,5162681,5288731,5648999,5721647,7429538,5641630], defaultOn: true },
];

// Palette — golden/olive tones like the Tableau screenshot, cycling for multiple selections
const PALETTE = [
  '#b8960c','#2166ac','#d6604d','#4dac26','#762a83','#e08214','#1b7837','#c51b7d','#5aae61','#8073ac'
];

let activeColors = {}; // name -> color
let colorIdx = 0;

function getColor(name) {
  if (!activeColors[name]) {
    activeColors[name] = PALETTE[colorIdx % PALETTE.length];
    colorIdx++;
  }
  return activeColors[name];
}

// Build sidebar
const catList = document.getElementById('catList');
CATEGORIES.forEach(cat => {
  const item = document.createElement('div');
  item.className = 'cat-item' + (cat.defaultOn ? ' active' : '');
  item.dataset.name = cat.name;

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = !!cat.defaultOn;
  cb.id = 'cb_' + cat.name.replace(/\W/g,'_');

  const swatch = document.createElement('div');
  swatch.className = 'swatch';
  if (cat.defaultOn) swatch.style.background = getColor(cat.name);

  const lbl = document.createElement('label');
  lbl.htmlFor = cb.id;
  lbl.textContent = cat.name;

  item.appendChild(cb);
  item.appendChild(swatch);
  item.appendChild(lbl);
  catList.appendChild(item);

  item.addEventListener('click', (e) => {
    if (e.target === cb) return; // handled below
    cb.checked = !cb.checked;
    toggle(cat.name, cb.checked, item, swatch);
  });
  cb.addEventListener('change', () => {
    toggle(cat.name, cb.checked, item, swatch);
  });
});

function toggle(name, on, item, swatch) {
  if (on) {
    item.classList.add('active');
    swatch.style.background = getColor(name);
  } else {
    item.classList.remove('active');
  }
  updateChart();
}

// Chart setup
const ctx = document.getElementById('mainChart').getContext('2d');
const chartInst = new Chart(ctx, {
  type: 'line',
  data: { labels: YEARS, datasets: [] },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 300 },
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#fff',
        borderColor: '#ccc',
        borderWidth: 1,
        titleColor: '#444',
        bodyColor: '#222',
        padding: 12,
        cornerRadius: 2,
        titleFont: { size: 11, weight: '400' },
        bodyFont: { size: 12, weight: '600' },
        callbacks: {
          title: items => {
            const cat = items[0]?.dataset?.label || '';
            const yr = items[0]?.label || '';
            return `Categories: ${cat}\nYear:         ${yr}`;
          },
          label: ctx => {
            const v = ctx.parsed.y;
            if (v === null || v === undefined) return null;
            return `Data:          ${v.toLocaleString()}`;
          }
        }
      }
    },
    scales: {
      x: {
        grid: { color: '#f0f0f0', drawBorder: false },
        border: { display: false },
        ticks: { color: '#888', font: { size: 11 } }
      },
      y: {
        grid: { color: '#f0f0f0', drawBorder: false },
        border: { display: false },
        ticks: {
          color: '#888',
          font: { size: 11 },
          callback: v => {
            if (v < 0) return (v/1000).toFixed(0)+'K';
            if (v >= 1000000) return (v/1000000).toFixed(1).replace('.0','')+'M';
            if (v >= 1000) return (v/1000).toFixed(0)+'K';
            return v;
          }
        }
      }
    }
  }
});

function updateChart() {
  const active = CATEGORIES.filter(c => {
    const cb = document.getElementById('cb_' + c.name.replace(/\W/g,'_'));
    return cb && cb.checked;
  });

  chartInst.data.datasets = active.map(cat => {
    const color = getColor(cat.name);
    // update swatch
    const item = catList.querySelector(`[data-name="${cat.name}"] .swatch`);
    if (item) item.style.background = color;

    return {
      label: cat.name,
      data: cat.data,
      borderColor: color,
      backgroundColor: 'transparent',
      borderWidth: 1.8,
      pointRadius: 4,
      pointHoverRadius: 6,
      pointBackgroundColor: color,
      pointBorderColor: color,
      tension: 0,
      spanGaps: false,
    };
  });

  // update chart title
  const names = active.map(c => c.name);
  document.getElementById('chartTitle').textContent = names.length ? names.join(', ') : 'Select a category';

  chartInst.update();
}

// Init with defaults on
updateChart();
</script>
</body>
</html>
